# Uncomment the following lines to enable the Corne RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# 0	Solid color    1 Breathe     2	Spectrum     3	Swirl
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# Cap underglow brightness. 27 WS2812s near 100% can collapse the nice_nano
# ext-power rail (~600 mA regulator) — and the OLED shares that rail, so BOTH
# the LEDs and the OLED die together. The right half is tightest (also runs the
# trackball + BLE-central). 15% matches the known-good reference; raise only if
# both OLED and RGB stay solid.
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=15
# Underglow on at boot (saved state was cleared by the settings_reset flash).
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# # Brightness step in percent used by RGB actions default 10
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=2
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=5
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=5

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_SLEEP=y

# Make Bluetooth stronger
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Disable external power when not connected to USB
# CONFIG_ZMK_EXT_POWER_USB_ONLY=y

## OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_LVGL=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

## Mouse / pointing behaviors (&mmv, &msc, &mkp) — required by native ZMK pointing
CONFIG_ZMK_POINTING=y

## Keep the OLED on instead of blanking when idle
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

## Pimoroni PIM447 trackball (polled — no INT pin needed)
CONFIG_I2C=y
CONFIG_INPUT=y
CONFIG_ZMK_PIM447_POLL=y
